name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install plugin dependencies
        run: flutter pub get

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Regenerate Pigeon and check format
        # Combined check: Pigeon outputs are not in dart-format style by
        # default, so we regenerate them, then run dart format on everything,
        # then check git diff. A clean diff means BOTH Pigeon is up to date
        # AND all files match dart format. Either kind of drift fails the
        # build with a clear actionable diff.
        run: |
          dart run pigeon --input pigeons/messages.dart
          dart format lib test pigeons
          if ! git diff --quiet; then
            echo "::error::Either Pigeon output or dart format is out of date. Run 'dart run pigeon --input pigeons/messages.dart && dart format lib test pigeons' locally and commit the changes."
            git --no-pager diff
            exit 1
          fi

      - name: dart analyze
        run: dart analyze --fatal-infos

      - name: Run unit tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

      - name: Pub publish dry-run
        # Validates the package is publishable: license, pubspec, formatting,
        # README structure, and so on. Catches release-time issues at PR time.
        run: dart pub publish --dry-run

  build-android:
    name: Build (Android)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: example
        run: flutter pub get

      - name: Build example APK
        working-directory: example
        run: flutter build apk --debug

  build-ios:
    name: Build (iOS)
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: example
        run: flutter pub get

      - name: Build example iOS (no codesign)
        working-directory: example
        run: flutter build ios --debug --no-codesign --simulator
